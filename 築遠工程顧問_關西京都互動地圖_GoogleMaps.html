<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>築遠｜關西京都五日行程地圖</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --font: 'Microsoft JhengHei', '微軟正黑體', 'PingFang TC', 'Heiti TC', sans-serif;
  --ink: #1a1714;
  --paper: #f7f4ef;
  --muted: #9a8e83;
  --border: rgba(255,255,255,0.1);
  --day1: #c0392b;
  --day2: #2980b9;
  --day3: #27ae60;
  --day4: #8e44ad;
  --day5: #d35400;
}
body {
  font-family: var(--font);
  background: var(--ink);
  color: var(--paper);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.header {
  background: #111;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-title { font-size: 15px; font-weight: 700; }
.header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.tab-bar {
  background: #0d0d0d;
  border-bottom: 1px solid var(--border);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: none;
  padding: 10px 14px;
  background: none;
  border: none;
  border-bottom: 2.5px solid transparent;
  cursor: pointer;
  font-family: var(--font);
  font-size: 13px;
  color: var(--muted);
  white-space: nowrap;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tab-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tab-btn.active { color: var(--paper); font-weight: 700; }
.tab-btn[data-day="1"] .tab-dot { background: var(--day1); }
.tab-btn[data-day="2"] .tab-dot { background: var(--day2); }
.tab-btn[data-day="3"] .tab-dot { background: var(--day3); }
.tab-btn[data-day="4"] .tab-dot { background: var(--day4); }
.tab-btn[data-day="5"] .tab-dot { background: var(--day5); }
.tab-btn[data-day="1"].active { border-bottom-color: var(--day1); }
.tab-btn[data-day="2"].active { border-bottom-color: var(--day2); }
.tab-btn[data-day="3"].active { border-bottom-color: var(--day3); }
.tab-btn[data-day="4"].active { border-bottom-color: var(--day4); }
.tab-btn[data-day="5"].active { border-bottom-color: var(--day5); }
.main { flex: 1; display: flex; overflow: hidden; position: relative; min-height: 0; }
#map { flex: 1; height: 100%; }
.map-controls {
  position: absolute;
  top: 10px; left: 10px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.search-wrapper {
  display: flex;
  align-items: center;
  background: rgba(15,13,12,0.93);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  width: 240px;
}
.search-icon { padding: 0 8px 0 12px; font-size: 15px; flex-shrink: 0; opacity: 0.5; }
#search-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--paper); font-family: var(--font);
  font-size: 14px; padding: 11px 4px 11px 0;
}
#search-input::placeholder { color: rgba(247,244,239,0.3); }
.search-clear {
  padding: 0 10px; background: none; border: none;
  color: rgba(247,244,239,0.4); font-size: 16px; cursor: pointer; display: none;
}
.map-btn {
  width: 42px; height: 42px;
  background: rgba(15,13,12,0.93);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  font-size: 20px;
  transition: all 0.2s;
}
.map-btn.gps-active { border-color: #4a90d9; box-shadow: 0 0 0 2px rgba(74,144,217,0.35); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.map-btn.locating { animation: pulse 1s infinite; }
.sidebar {
  width: 340px;
  flex-shrink: 0;
  background: rgba(14,12,11,0.97);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  z-index: 2;
  display: flex;
  flex-direction: column;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
.sidebar-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: rgba(14,12,11,0.99);
  z-index: 10;
}
.day-label { font-size: 11px; letter-spacing: 0.2em; font-weight: 700; margin-bottom: 5px; }
.day-title { font-size: 18px; font-weight: 700; line-height: 1.35; margin-bottom: 10px; }
.day-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.meta-pill {
  font-size: 12px; padding: 4px 11px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.12); color: rgba(247,244,239,0.65);
}
.drive-box {
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 4px;
}
.drive-main {
  font-size: 14px; font-weight: 700; color: var(--paper);
  display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
}
.drive-detail { font-size: 12px; color: var(--muted); line-height: 1.7; }
.export-btn {
  width: 100%; margin-top: 10px;
  padding: 11px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: var(--paper);
  font-family: var(--font);
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background 0.15s;
}
.export-btn:active { background: rgba(255,255,255,0.1); }
.stops-list { padding: 8px 0 32px; }
.stop-item {
  display: flex; gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  transition: background 0.12s;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.stop-item:active, .stop-item.active-stop { background: rgba(255,255,255,0.06); }
.stop-left { flex-shrink: 0; width: 36px; padding-top: 2px; }
.stop-num {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: white;
}
.stop-content { flex: 1; }
.stop-name { font-size: 15px; font-weight: 700; color: var(--paper); line-height: 1.4; margin-bottom: 5px; }
.stop-desc { font-size: 13px; color: var(--muted); line-height: 1.65; margin-bottom: 8px; }
.stop-badges { display: flex; flex-wrap: wrap; gap: 5px; }
.sbadge { font-size: 12px; padding: 3px 10px; border-radius: 4px; font-weight: 500; }
.sbadge-meal  { background: rgba(201,151,58,0.18); color: #e0b86a; }
.sbadge-hotel { background: rgba(42,79,122,0.3);   color: #7ab0d4; }
.sbadge-tip   { background: rgba(58,107,66,0.28);  color: #7ec490; }
.sbadge-warn  { background: rgba(184,58,42,0.22);  color: #eca090; }
.sidebar-toggle {
  display: none;
  position: absolute; bottom: 20px; right: 16px; z-index: 999;
  background: var(--ink); border: 1px solid rgba(255,255,255,0.22);
  color: var(--paper); border-radius: 50%; width: 52px; height: 52px;
  font-size: 22px; cursor: pointer; align-items: center; justify-content: center;
  box-shadow: 0 4px 24px rgba(0,0,0,0.6);
}
.gmnoprint { z-index: 1 !important; }
@media (max-width: 1024px) {
  .header-title { font-size: 14px; }
  .tab-btn { font-size: 12px; padding: 10px 11px; }
  .search-wrapper { width: 190px; }
  .sidebar {
    position: absolute; right: 0; top: 0; bottom: 0; width: 90%;
    transform: translateX(100%); transition: transform 0.28s ease;
    box-shadow: -8px 0 32px rgba(0,0,0,0.6);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-toggle { display: flex; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">築遠工程顧問｜關西京都五日行程</div>
  <div class="header-sub">點選地圖標記或右側景點查看詳情</div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-day="1" onclick="switchDay(1)"><span class="tab-dot"></span>DAY 1 抵達京都</button>
  <button class="tab-btn" data-day="2" onclick="switchDay(2)"><span class="tab-dot"></span>DAY 2 清水寺・合掌村</button>
  <button class="tab-btn" data-day="3" onclick="switchDay(3)"><span class="tab-dot"></span>DAY 3 伊根・天橋立</button>
  <button class="tab-btn" data-day="4" onclick="switchDay(4)"><span class="tab-dot"></span>DAY 4 大阪自由</button>
  <button class="tab-btn" data-day="5" onclick="switchDay(5)"><span class="tab-dot"></span>DAY 5 返台</button>
</div>

<div class="main">
  <div id="map"></div>

  <div class="map-controls">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input id="search-input" type="text" placeholder="搜尋地點...">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
    </div>
    <button class="map-btn" id="gps-btn" onclick="toggleGps()">📍</button>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header" id="sidebar-header"></div>
    <div class="stops-list" id="stops-list"></div>
  </div>

  <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
</div>

<script>
const DAYS = {
  1: {
    label: 'DAY 1', title: '抵達京都 — 千本鳥居・祇園夜色',
    meta: ['✈ 桃園 06:30', '関空 10:10 抵達', '住：大津王子或同級'],
    driveTime: '約 1.5 小時車程',
    driveDetail: '関空→伏見 約50分｜伏見→祇園 約15分｜祇園→大津 約25分',
    color: '#c0392b', center: { lat: 34.95, lng: 135.72 }, zoom: 11, exportable: true,
    stops: [
      { lat: 34.434,  lng: 135.244,  name: '關西國際機場', desc: '長榮 BR178，06:30 起飛，10:10 抵達',
        detail: '建於大阪灣人工島上，是日本首座24小時運作的國際機場。長榮 BR178 於桃園 06:30 起飛，10:10 抵達。',
        icon: '✈',  badges: [{ text: '午：機上簡餐＋花壽司餐盒', cls: 'sbadge-meal' }] },
      { lat: 34.9677, lng: 135.7792, name: '伏見稻荷大社 — 千本鳥居', desc: '朱紅色鳥居神秘隧道直通稻荷山頂，京都最具代表性絕景',
        detail: '創建於西元711年，是全日本約三萬座稻荷神社的總本山，主祀掌管農業與商業的稻荷神。最著名的是本殿後方由上千座朱紅色鳥居連綿而成的神秘隧道，一路蜿蜒直通稻荷山頂。建議不必走到山頂，在入口後的第一段鳥居群即是拍照最美的位置，人潮相對較少。',
        icon: '⛩',  badges: [{ text: '建議不爬山頂，中段最美', cls: 'sbadge-tip' }] },
      { lat: 35.0038, lng: 135.775,  name: '祇園 — 花見小路', desc: '石板小徑兩旁茶屋料理店，偶然邂逅踩木屐的年輕舞妓',
        detail: '京都最具代表性的花街，南北貫穿祇園地區的石板小徑兩旁，林立著格子窗的茶屋、料亭與高級料理店。這裡是日本僅存的花街文化保存地之一，傍晚時分偶爾可見身著華麗和服、踩著高木屐的舞妓穿梭其中。建議傍晚6點後造訪，氣氛最為迷人，但請勿強行拍攝舞妓，保持禮貌。',
        icon: '🌸', badges: [{ text: '晚：相撲鍋吃到飽（¥3,500）', cls: 'sbadge-meal' }] },
      { lat: 35.0048, lng: 135.8889, name: '大津王子飯店（住宿）', desc: '琵琶湖畔，京都市東南方',
        detail: '位於琵琶湖西岸，是近畿地區最大湖泊旁的高層飯店，部分房型可直接欣賞琵琶湖全景。大津市雖屬滋賀縣，但距離京都市中心僅約20分鐘車程，交通便利。飯店設施完善，含餐廳、溫泉及游泳池，是關西地區知名的度假型商務飯店。飯店提供免費接駁巴士往返大津站。',
        icon: '🏨', badges: [{ text: '住宿', cls: 'sbadge-hotel' }] },
      { lat: 34.9978, lng: 135.8835, name: 'craft beer house B.B', desc: '飯店步行約15分，全日本精釀啤酒11～12種常備',

        icon: '🍺', badges: [{ text: '週三～六 18:30～23:30', cls: 'sbadge-tip' }, { text: '週一二日公休', cls: 'sbadge-warn' }],
        bar: true }
    ]
  },
  2: {
    label: 'DAY 2', title: '清水寺・合掌秘境 → 丹後溫泉',
    meta: ['飯店早餐', '住：天橋立區域溫泉飯店', '含泡湯'],
    driveTime: '約 3.5 小時車程',
    driveDetail: '大津→清水寺 約30分｜清水寺→美山町 約70分｜美山町→舞鶴 約45分｜舞鶴→天橋立 約40分',
    color: '#2980b9', center: { lat: 35.2, lng: 135.6 }, zoom: 10, exportable: true,
    stops: [
      { lat: 34.9947, lng: 135.7847, name: '世界遺產 清水寺 — 二、三年坂', desc: '建於798年，清水舞台139根大圓木支撐，未用一根釘子',

        icon: '🏠', badges: [{ text: '午：美山御膳（¥2,500）', cls: 'sbadge-meal' }, { text: '自己去交通不便', cls: 'sbadge-tip' }] },
      { lat: 35.4747, lng: 135.3854, name: '舞鶴紅磚公園', desc: '8棟列為國家重要文化財，古典歐洲氛圍',

        icon: '🧱', badges: [] },
      { lat: 35.5698, lng: 135.1918, name: '天橋立區域溫泉飯店（住宿）', desc: '宮津美居Spa / 京丹後中央 / 天橋立莊 / 佳松苑 或同級',

    ]
  },
  3: {
    label: 'DAY 3', title: '米其林秘境・日本三景 → 大阪',
    meta: ['飯店早餐', '住：大阪市區飯店', '今日移動量最大'],
    driveTime: '約 4.5 小時車程',
    driveDetail: '飯店→伊根 約30分｜伊根→天橋立 約30分｜天橋立→大阪 約2.5小時',
    color: '#27ae60', center: { lat: 35.3, lng: 135.35 }, zoom: 9, exportable: true,
    stops: [
      { lat: 35.6757, lng: 135.2875, name: '★ 米其林 伊根灣舟屋 — 海上遊覽船', desc: '230間舟屋圍繞靜謐伊根灣，從海上欣賞江戶時代漁村聚落',

        icon: '⛵', badges: [{ text: '早：飯店內早餐', cls: 'sbadge-meal' }, { text: '天候不佳退費¥600/人', cls: 'sbadge-warn' }] },
      { lat: 35.5827, lng: 135.1967, name: '元伊勢籠神社', desc: '2500年以上歷史，據說是伊勢神宮的本源',

// GPS
function toggleGps() {
  gpsActive ? stopGps() : startGps();
}

function startGps() {
  if (!navigator.geolocation) { alert('你的瀏覽器不支援 GPS 定位'); return; }
  const btn = document.getElementById('gps-btn');
  btn.classList.add('locating');
  btn.textContent = '⏳';

  gpsWatchId = navigator.geolocation.watchPosition(
    (pos) => {
      btn.classList.remove('locating');
      btn.textContent = '🔵';
      btn.classList.add('gps-active');
      gpsActive = true;
      const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      const acc = pos.coords.accuracy;

      if (gpsCircle) { gpsCircle.setCenter(latlng); gpsCircle.setRadius(acc); }
      else {
        gpsCircle = new google.maps.Circle({
          center: latlng, radius: acc, map,
          fillColor: '#4a90d9', fillOpacity: 0.1,
          strokeColor: '#4a90d9', strokeOpacity: 0.35, strokeWeight: 1
        });
      }
      if (gpsMarker) { gpsMarker.setPosition(latlng); }
      else {
        gpsMarker = new google.maps.Marker({
          position: latlng, map, zIndex: 1000, title: '我的位置',
          icon: { path: google.maps.SymbolPath.CIRCLE, scale: 10, fillColor: '#4a90d9', fillOpacity: 1, strokeColor: 'white', strokeWeight: 2.5 }
        });
        gpsMarker.addListener('click', () => {
          infoWindow.setContent(`<div style="font-family:sans-serif;padding:4px;"><b style="font-size:14px;">📍 我的位置</b><div style="font-size:12px;color:#7a6e63;margin-top:4px;">精確度：約 ${Math.round(acc)} 公尺</div></div>`);
          infoWindow.open(map, gpsMarker);
        });
        map.panTo(latlng); map.setZoom(15);
      }
    },
    () => { stopGps(); alert('無法取得位置，請確認已允許瀏覽器定位權限'); },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

function stopGps() {
  if (gpsWatchId !== null) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
  if (gpsMarker) { gpsMarker.setMap(null); gpsMarker = null; }
  if (gpsCircle) { gpsCircle.setMap(null); gpsCircle = null; }
  gpsActive = false;
  const btn = document.getElementById('gps-btn');
  btn.textContent = '📍';
  btn.classList.remove('gps-active', 'locating');
}

// Search
function onPlaceChanged() {
  const place = autocomplete.getPlace();
  if (!place || !place.geometry || !place.geometry.location) {
    const val = document.getElementById('search-input').value;
    if (!val) return;
    new google.maps.Geocoder().geocode({ address: val }, (results, status) => {
      if (status === 'OK' && results[0]) {
        placeMarkerAndPan(results[0].geometry.location, val, results[0].formatted_address, results[0].geometry.viewport);
      }
    });
    return;
  }
  placeMarkerAndPan(place.geometry.location, place.name, place.formatted_address, place.geometry.viewport);
}

function placeMarkerAndPan(location, name, address, viewport) {
  if (searchMarker) { searchMarker.setMap(null); searchMarker = null; }
  searchMarker = new google.maps.Marker({
    position: location, map, zIndex: 999, title: name,
    icon: { path: google.maps.SymbolPath.CIRCLE, scale: 14, fillColor: '#f0c040', fillOpacity: 1, strokeColor: 'white', strokeWeight: 2.5 }
  });
  infoWindow.setContent(`<div style="font-family:sans-serif;padding:4px;min-width:180px;max-width:240px;"><div style="font-size:11px;color:#c9973a;font-weight:700;margin-bottom:4px;">🔍 搜尋結果</div><div style="font-size:14px;font-weight:700;color:#1a1714;margin-bottom:4px;">${name}</div><div style="font-size:12px;color:#7a6e63;">${address || ''}</div></div>`);
  infoWindow.open(map, searchMarker);
  if (viewport) map.fitBounds(viewport);
  else { map.panTo(location); map.setZoom(16); }
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  if (searchMarker) { searchMarker.setMap(null); searchMarker = null; }
  infoWindow.close();
}

// Map
function clearMarkers() { markers.forEach(m => m.setMap(null)); markers = []; }

function switchDay(dayNum) {
  currentDay = dayNum;
  const day = DAYS[dayNum];

    const iBar = stop.bar === true;

      position: { lat: stop.lat, lng: stop.lng }, map,
      label: iBar ? null : { text: String(markerNum), color: 'white', fontSize: '14px', fontWeight: 'bold' },
      icon: iBar
        ? { path: google.maps.SymbolPath.CIRCLE, scale: 10, fillColor: '#f0c040', fillOpacity: 0.9, strokeColor: 'white', strokeWeight: 2 }

      title: stop.name,
      zIndex: iBar ? 1 : 5
    });
    const badgeHtml = stop.badges.map(b => `<span style="display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin-top:4px;margin-right:4px;background:rgba(201,151,58,0.15);color:#c9973a;border:1px solid rgba(201,151,58,0.3);">${b.text}</span>`).join('');
    marker.addListener('click', () => {
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(stop.name + ' 日本')}`;
      const detailText = stop.detail || stop.desc;
      infoWindow.setContent(`<div style="font-family:sans-serif;padding:4px;min-width:220px;max-width:280px;"><div style="font-size:10px;color:${day.color};font-weight:700;margin-bottom:4px;">${day.label} · ${i+1}/${day.stops.length}</div><div style="font-size:15px;font-weight:700;color:#1a1714;margin-bottom:6px;">${stop.icon} ${stop.name}</div><div style="font-size:13px;color:#555;line-height:1.7;margin-bottom:8px;">${detailText}</div>${badgeHtml}<div style="margin-top:10px;"><a href="${mapsUrl}" target="_blank" style="display:inline-block;background:#4285f4;color:white;font-size:12px;font-weight:700;padding:7px 14px;border-radius:6px;text-decoration:none;">🗺 Google Maps 查看</a></div></div>`);
      infoWindow.open(map, marker);
      highlightStop(i);
    });
    markers.push(marker);
  });
  map.panTo(day.center); map.setZoom(day.zoom);
}

function renderSidebar(dayNum) {
  const day = DAYS[dayNum];
  const header = document.getElementById('sidebar-header');
  header.style.borderBottom = `2px solid ${day.color}50`;

  const driveHtml = day.driveTime
    ? `<div class="drive-box"><div class="drive-main">🚌 ${day.driveTime}</div><div class="drive-detail">${day.driveDetail}</div></div>`
    : `<div class="drive-box"><div class="drive-main">🚶 全日自由活動，不派車</div></div>`;

  const exportHtml = day.exportable
    ? `<button class="export-btn" onclick="exportToGoogleMaps(${dayNum})">🗺 匯出至 Google Maps</button>`
    : '';

  header.innerHTML = `
    <div class="day-label" style="color:${day.color}">${day.label}</div>
    <div class="day-title">${day.title}</div>
    <div class="day-meta">${day.meta.map(m => `<span class="meta-pill">${m}</span>`).join('')}</div>
    ${driveHtml}${exportHtml}
  `;

  const stopsHtml = day.stops.map((stop, i) => {
    const isFirstBar = stop.bar && (i === 0 || !day.stops[i-1].bar);
    const separator = isFirstBar ? `<div style="padding:10px 16px 6px;font-size:11px;letter-spacing:0.15em;font-weight:700;color:var(--muted);border-top:1px solid rgba(255,255,255,0.06);margin-top:4px;">🍺 晚上推薦酒吧／居酒屋</div>` : '';
    const numHtml = stop.bar
      ? `<div style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:16px;">🍺</div>`
      : `<div class="stop-num" style="background:${day.color}">${i+1 - day.stops.slice(0,i).filter(s=>s.bar).length}</div>`;
    return separator + `
    <div class="stop-item" id="stop-${i}" onclick="focusStop(${i})">
      <div class="stop-left">${numHtml}</div>
      <div class="stop-content">
        <div class="stop-name">${stop.icon} ${stop.name}</div>
        <div class="stop-desc">${stop.desc}</div>
        <div class="stop-badges">${stop.badges.map(b => `<span class="sbadge ${b.cls}">${b.text}</span>`).join('')}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('stops-list').innerHTML = stopsHtml;
}

function focusStop(idx) {
  const stop = DAYS[currentDay].stops[idx];
  map.panTo({ lat: stop.lat, lng: stop.lng }); map.setZoom(15);
  google.maps.event.trigger(markers[idx], 'click');
  highlightStop(idx);
  if (window.innerWidth <= 1024) document.getElementById('sidebar').classList.remove('open');
}

function highlightStop(idx) {
  document.querySelectorAll('.stop-item').forEach((el, i) => el.classList.toggle('active-stop', i === idx));
  const el = document.getElementById(`stop-${idx}`);
  if (el) {
    const sidebar = document.getElementById('sidebar');
    const elTop = el.offsetTop;
    const elBottom = elTop + el.offsetHeight;
    const sidebarTop = sidebar.scrollTop;
    const sidebarBottom = sidebarTop + sidebar.clientHeight;
    if (elTop < sidebarTop || elBottom > sidebarBottom) {
      sidebar.scrollTo({ top: elTop - 80, behavior: 'smooth' });
    }
  }
}

function exportToGoogleMaps(dayNum) {
  const stops = DAYS[dayNum].stops;
  const pts = stops.map(s => `${s.lat},${s.lng}`);
  const url = `https://www.google.com/maps/dir/${pts.join('/')}`;
  window.open(url, '_blank');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}
</script>

  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBtebHQaANklp3rQAr1t2IhzAdrUGMTDrA&libraries=places&callback=initMap&language=zh-TW">
</script>
